<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MathCore{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #070b12;
  --surface:  #0d1420;
  --surface2: #121c2e;
  --border:   #1e2f4a;
  --accent:   #00e5ff;
  --accent2:  #ff4d6d;
  --accent3:  #a855f7;
  --gold:     #fbbf24;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --green:    #10b981;
  --radius:   12px;
  --mono:     'Space Mono', monospace;
  --sans:     'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── grid noise bg ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,229,255,.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(168,85,247,.06) 0%, transparent 60%);
  pointer-events: none;
}

/* ── scanline overlay ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px
  );
  pointer-events: none;
}

main { position: relative; z-index: 1; }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 1rem;
  padding: .75rem 2rem;
  background: rgba(7,11,18,.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: .1em;
}
.nav-logo span { color: var(--accent2); }

.nav-links { display: flex; gap: .5rem; margin-left: auto; }

.nav-btn {
  font-family: var(--mono);
  font-size: .7rem;
  letter-spacing: .08em;
  padding: .4rem .9rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s;
}
.nav-btn:hover, .nav-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,229,255,.05);
}

/* ── XP BAR (nav) ── */
.nav-xp {
  display: flex; align-items: center; gap: .6rem;
  margin-left: 1.5rem;
}
.xp-label {
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--gold);
  white-space: nowrap;
}
.xp-track {
  width: 90px; height: 6px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
}
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--accent2));
  border-radius: 99px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.card:hover { border-color: rgba(0,229,255,.25); box-shadow: 0 0 24px rgba(0,229,255,.05); }
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,229,255,.3), transparent);
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  font-family: var(--mono);
  font-size: .8rem;
  letter-spacing: .06em;
  padding: .7rem 1.4rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
  border: none;
  font-weight: 700;
}
.btn-primary {
  background: var(--accent);
  color: var(--bg);
}
.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,229,255,.3); }

.btn-outline {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
}
.btn-outline:hover { background: rgba(0,229,255,.08); transform: translateY(-1px); }

.btn-danger {
  background: var(--accent2);
  color: #fff;
}
.btn-danger:hover { filter: brightness(1.1); }

.btn-ghost {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-ghost:hover { border-color: var(--border); color: var(--text); }

/* ── CHOICES ── */
.choice-btn {
  display: block; width: 100%;
  text-align: left;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--sans);
  font-size: .9rem;
  padding: .85rem 1.2rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  margin-bottom: .5rem;
  position: relative;
  overflow: hidden;
}
.choice-btn::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent);
  transform: scaleY(0);
  transition: transform .2s;
}
.choice-btn:hover { border-color: rgba(0,229,255,.4); background: rgba(0,229,255,.04); }
.choice-btn:hover::before { transform: scaleY(1); }
.choice-btn.selected { border-color: var(--accent); background: rgba(0,229,255,.08); }
.choice-btn.selected::before { transform: scaleY(1); }
.choice-btn.correct { border-color: var(--green); background: rgba(16,185,129,.1); color: var(--green); }
.choice-btn.wrong   { border-color: var(--accent2); background: rgba(255,77,109,.1); color: var(--accent2); }
.choice-btn:disabled { cursor: default; }

/* ── PROGRESS BAR ── */
.progress-wrap { margin-bottom: 1.5rem; }
.progress-label {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: .65rem; color: var(--muted);
  margin-bottom: .4rem;
}
.progress-track {
  height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  border-radius: 99px;
  transition: width .5s ease;
}

/* ── SKILL BARS ── */
.skill-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .6rem; }
.skill-name { font-family: var(--mono); font-size: .65rem; color: var(--muted); width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.skill-bar { flex: 1; height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.skill-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--accent3), var(--accent));
  transition: width .8s cubic-bezier(.34,1.56,.64,1);
}
.skill-pct { font-family: var(--mono); font-size: .6rem; color: var(--muted); width: 28px; text-align: right; }

/* ── BADGE ── */
.badge {
  display: inline-flex; align-items: center; gap: .3rem;
  font-family: var(--mono); font-size: .65rem; letter-spacing: .06em;
  padding: .25rem .6rem; border-radius: 99px;
  border: 1px solid;
}
.badge-cyan  { border-color: var(--accent);  color: var(--accent);  background: rgba(0,229,255,.07); }
.badge-pink  { border-color: var(--accent2); color: var(--accent2); background: rgba(255,77,109,.07); }
.badge-gold  { border-color: var(--gold);    color: var(--gold);    background: rgba(251,191,36,.07); }
.badge-green { border-color: var(--green);   color: var(--green);   background: rgba(16,185,129,.07); }
.badge-purple{ border-color: var(--accent3); color: var(--accent3); background: rgba(168,85,247,.07); }

/* ── MISC ── */
.mono { font-family: var(--mono); }
h1,h2,h3 { font-family: var(--sans); font-weight: 800; }
h1 { font-size: clamp(1.8rem,4vw,3rem); }
h2 { font-size: clamp(1.2rem,2.5vw,1.8rem); }

.tag {
  font-family: var(--mono); font-size: .6rem; letter-spacing: .1em;
  color: var(--accent); text-transform: uppercase;
  border: 1px solid rgba(0,229,255,.2);
  padding: .2rem .5rem; border-radius: 4px; display: inline-block;
  margin-bottom: .5rem;
}

.flash {
  padding: .7rem 1rem;
  border-radius: 8px;
  font-family: var(--mono); font-size: .8rem;
  margin-bottom: 1rem;
}
.flash-success { background: rgba(16,185,129,.12); border: 1px solid var(--green); color: var(--green); }
.flash-error   { background: rgba(255,77,109,.12);  border: 1px solid var(--accent2); color: var(--accent2); }
.flash-info    { background: rgba(0,229,255,.08);    border: 1px solid var(--accent); color: var(--accent); }

/* ── CONTAINER ── */
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
.container-wide { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
  font-family: var(--mono); font-size: .8rem;
  padding: .7rem 1.2rem; border-radius: 8px;
  opacity: 0; transform: translateY(10px);
  transition: all .3s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.t-success { background: var(--green); color: var(--bg); }
#toast.t-error   { background: var(--accent2); color: #fff; }
#toast.t-info    { background: var(--accent); color: var(--bg); }

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 1rem; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 1rem; }

/* ── STREAK COUNTER ── */
.streak-badge {
  display: inline-flex; align-items: center; gap: .3rem;
  font-family: var(--mono); font-size: .7rem;
  color: var(--gold);
}
.streak-fire { font-size: 1rem; }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:.5; } }
@keyframes glow   { 0%,100% { box-shadow: 0 0 10px rgba(0,229,255,.3); } 50% { box-shadow: 0 0 25px rgba(0,229,255,.6); } }
@keyframes xpPop  { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

.fade-in { animation: fadeIn .4s ease forwards; }

/* ── RESPONSIVE ── */
@media (max-width:600px) {
  nav { padding: .6rem 1rem; }
  .nav-xp { display: none; }
  .container { padding: 1.2rem 1rem; }
}
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-logo">MATH<span>CORE</span></a>
  <div class="nav-links">
    <a href="/" class="nav-btn {% if request.endpoint=='index' %}active{% endif %}">Dashboard</a>
    <a href="/help" class="nav-btn {% if 'help' in request.endpoint %}active{% endif %}">Help Please</a>
    <a href="/test" class="nav-btn {% if 'test' in request.endpoint %}active{% endif %}">Test</a>
    <a href="/exercise" class="nav-btn {% if 'exercise' in request.endpoint %}active{% endif %}">Üben</a>
  </div>
  {% if profile is defined %}
  <div class="nav-xp">
    <span class="xp-label">LVL {{ level }} · {{ profile.xp }} XP</span>
    <div class="xp-track"><div class="xp-fill" style="width:{{ [xp_in/xp_need*100,100]|min }}%"></div></div>
    {% if profile.streak > 1 %}
    <span class="streak-badge"><span class="streak-fire">🔥</span>{{ profile.streak }}</span>
    {% endif %}
  </div>
  {% endif %}
</nav>

<main>
{% block content %}{% endblock %}
</main>

<div id="toast"></div>

<script>
function toast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show t-${type}`;
  setTimeout(() => t.className = '', 2500);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
